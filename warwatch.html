<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WARWATCH — 全球戰區情報系統</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #07090d;
      --panel: #0c0f14;
      --border: #1a2535;
      --accent: #00c8ff;
      --danger: #ff3b3b;
      --warn: #ffaa00;
      --ok: #00e676;
      --text: #bfd0e0;
      --muted: #3d5268;
      --header: #050709;
      --war: #ff2222;
      --conflict: #ff7700;
      --tension: #ffcc00;
      --monitor: #44aaff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--header);
      border-bottom: 2px solid var(--border);
      padding: 7px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      z-index: 1000;
    }
    .logo {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 5px;
      color: var(--accent);
      text-shadow: 0 0 16px rgba(0,200,255,0.5);
    }
    .logo span { color: var(--danger); text-shadow: 0 0 16px rgba(255,50,50,0.6); }
    .logo sub { font-size: 9px; letter-spacing: 2px; color: var(--muted); vertical-align: bottom; }
    .header-pills { display: flex; gap: 14px; align-items: center; }
    .pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; letter-spacing: 1px; color: var(--muted);
      border: 1px solid var(--border); padding: 2px 8px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ok); box-shadow: 0 0 5px var(--ok);
      animation: blink 2s infinite;
    }
    .dot.r { background: var(--danger); box-shadow: 0 0 5px var(--danger); }
    .dot.y { background: var(--warn); box-shadow: 0 0 5px var(--warn); }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
    .utc { font-size: 11px; color: var(--accent); letter-spacing: 2px; margin-left: auto; }
    .gti-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; letter-spacing: 1px;
    }
    .gti-val {
      font-size: 16px; font-weight: 700; color: var(--danger);
      text-shadow: 0 0 10px rgba(255,50,50,0.7);
    }

    /* ── API Banner ── */
    #api-banner {
      background: #080c12;
      border-bottom: 1px solid var(--border);
      padding: 5px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #api-banner > label {
      font-size: 10px; letter-spacing: 2px; color: var(--muted);
      white-space: nowrap; border-right: 1px solid var(--border); padding-right: 10px;
    }
    .api-group { display: flex; align-items: center; gap: 6px; }
    .api-group label { font-size: 9px; letter-spacing: 1px; color: var(--muted); white-space: nowrap; }
    .api-group input {
      background: #050810; border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 11px;
      padding: 3px 8px; width: 200px; outline: none;
    }
    .api-group input:focus { border-color: var(--accent); }
    .api-group input::placeholder { color: var(--muted); }
    .btn-xs {
      background: transparent; border: 1px solid var(--accent); color: var(--accent);
      font-family: inherit; font-size: 10px; letter-spacing: 1px;
      padding: 3px 10px; cursor: pointer;
    }
    .btn-xs:hover { background: rgba(0,200,255,.1); }
    .api-stat {
      font-size: 9px; letter-spacing: 1px; padding: 2px 6px;
      border: 1px solid var(--muted); color: var(--muted);
    }
    .api-stat.on { border-color: var(--ok); color: var(--ok); }

    /* ── Layout ── */
    .main {
      display: grid;
      grid-template-columns: 300px 1fr 310px;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar.right { border-right: none; border-left: 1px solid var(--border); }
    .phead {
      background: var(--header);
      border-bottom: 1px solid var(--border);
      padding: 7px 11px;
      font-size: 10px; letter-spacing: 2px; color: var(--accent);
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .phead .cnt {
      margin-left: auto;
      background: rgba(0,200,255,.08); border: 1px solid var(--accent);
      color: var(--accent); font-size: 9px; padding: 1px 5px;
    }
    .pbody { flex: 1; overflow-y: auto; }
    .pbody::-webkit-scrollbar { width: 3px; }
    .pbody::-webkit-scrollbar-track { background: var(--bg); }
    .pbody::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Region quick-jump ── */
    .region-bar {
      padding: 5px 8px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 3px; flex-wrap: wrap;
      flex-shrink: 0;
    }
    .rbtn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-family: inherit; font-size: 9px;
      letter-spacing: 1px; padding: 2px 7px; cursor: pointer;
      transition: all .15s;
    }
    .rbtn:hover, .rbtn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,200,255,.07); }

    /* ── Conflict cards ── */
    .conflict-card {
      border-bottom: 1px solid var(--border);
      border-left: 3px solid var(--muted);
      padding: 8px 10px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .conflict-card:hover { background: #0b1018; }
    .conflict-card.active { background: #0b1018; border-left-color: var(--accent); }
    .conflict-card.war  { border-left-color: var(--war); }
    .conflict-card.conflict { border-left-color: var(--conflict); }
    .conflict-card.tension  { border-left-color: var(--tension); }
    .conflict-card.monitor  { border-left-color: var(--monitor); }
    .c-top { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .c-flag { font-size: 14px; }
    .c-name { font-size: 11px; font-weight: 700; letter-spacing: 1px; flex: 1; }
    .c-badge {
      font-size: 8px; letter-spacing: 1px; padding: 1px 5px;
      border: 1px solid currentColor;
    }
    .c-badge.war     { color: var(--war); }
    .c-badge.conflict{ color: var(--conflict); }
    .c-badge.tension { color: var(--tension); }
    .c-badge.monitor { color: var(--monitor); }
    .c-meta { font-size: 10px; color: var(--muted); line-height: 1.6; }
    .c-meta b { color: var(--text); }
    .c-intensity { margin-top: 5px; }
    .c-bar-wrap { height: 3px; background: #0d1520; margin-top: 3px; }
    .c-bar { height: 100%; }

    /* ── Global stats strip ── */
    .stats-strip {
      display: flex; border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stat-cell {
      flex: 1; padding: 6px 8px; text-align: center;
      border-right: 1px solid var(--border);
      font-size: 10px;
    }
    .stat-cell:last-child { border-right: none; }
    .stat-cell .sv { font-size: 14px; font-weight: 700; display: block; }
    .stat-cell .sk { color: var(--muted); font-size: 9px; letter-spacing: 1px; }

    /* ── Map ── */
    #map { width: 100%; height: 100%; background: #050810; }
    .leaflet-tile { filter: invert(1) hue-rotate(180deg) brightness(0.65) saturate(0.5); }
    .leaflet-control-zoom a {
      background: var(--panel) !important; color: var(--accent) !important;
      border-color: var(--border) !important;
    }
    .leaflet-popup-content-wrapper {
      background: #0c111a; border: 1px solid var(--accent);
      border-radius: 0; color: var(--text);
      font-family: 'Courier New', monospace; font-size: 11px;
      box-shadow: 0 0 20px rgba(0,200,255,.2);
    }
    .leaflet-popup-tip { background: var(--accent); }
    .leaflet-tooltip {
      background: rgba(5,8,16,.95) !important; border: 1px solid var(--border) !important;
      color: var(--text) !important; font-family: inherit !important;
      font-size: 10px !important; border-radius: 0 !important;
    }

    /* ── Map overlay controls ── */
    .map-ctrl {
      position: absolute; top: 10px; left: 50%;
      transform: translateX(-50%); z-index: 500;
      display: flex; gap: 6px;
    }
    .mctrl {
      background: rgba(5,7,9,.92); border: 1px solid var(--border);
      color: var(--muted); font-family: inherit; font-size: 9px;
      letter-spacing: 1px; padding: 4px 11px; cursor: pointer; transition: all .15s;
    }
    .mctrl.active { border-color: var(--accent); color: var(--accent); }
    .mctrl:hover  { border-color: var(--accent); color: var(--accent); }

    /* pulsing war zone rings */
    @keyframes ripple {
      0%   { transform: scale(1);   opacity: .7; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .zone-ring {
      border-radius: 50%; position: absolute;
      animation: ripple 2.5s ease-out infinite;
    }

    /* ── Intel feed ── */
    .feed-item {
      border-bottom: 1px solid var(--border);
      padding: 7px 10px; font-size: 11px; line-height: 1.5;
      cursor: pointer; transition: background .1s;
    }
    .feed-item:hover { background: #0b1018; }
    .feed-head { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
    .feed-time { font-size: 9px; color: var(--muted); letter-spacing: 1px; }
    .feed-region {
      font-size: 9px; letter-spacing: 1px; padding: 1px 5px;
      border: 1px solid var(--muted); color: var(--muted);
    }
    .feed-src { font-size: 9px; color: var(--muted); margin-left: auto; }
    .feed-txt { color: var(--text); }
    .feed-txt.high { color: #ff5555; }
    .feed-txt.med  { color: var(--warn); }
    .feed-txt.low  { color: #aaccaa; }

    .filt-bar {
      padding: 5px 8px; border-bottom: 1px solid var(--border);
      display: flex; gap: 3px; flex-wrap: wrap; flex-shrink: 0;
    }
    .fbtn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-family: inherit; font-size: 9px;
      letter-spacing: 1px; padding: 2px 7px; cursor: pointer; transition: all .15s;
    }
    .fbtn.on { border-color: var(--accent); color: var(--accent); background: rgba(0,200,255,.07); }
    .fbtn.h.on { border-color: var(--danger); color: var(--danger); background: rgba(255,59,59,.07); }
    .fbtn.m.on { border-color: var(--warn);   color: var(--warn);   background: rgba(255,170,0,.07); }

    /* ── Detail drawer ── */
    #detail-drawer {
      border-top: 1px solid var(--border);
      flex-shrink: 0; max-height: 200px; overflow-y: auto;
    }
    .drow {
      display: flex; justify-content: space-between;
      padding: 3px 10px; border-bottom: 1px solid #0b1220; font-size: 10px;
    }
    .drow .dk { color: var(--muted); letter-spacing: 1px; }
    .drow .dv { color: var(--text); text-align: right; max-width: 60%; }

    /* scanlines */
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
      pointer-events: none; z-index: 9999;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">WAR<span>WATCH</span> <sub>GLOBAL</sub></div>
  <div class="header-pills">
    <div class="pill"><div class="dot"></div>SYSTEM ONLINE</div>
    <div class="pill"><div class="dot r"></div>WARTIME CONDITIONS ACTIVE</div>
    <div class="pill"><div class="dot y"></div>16 ACTIVE THEATRES</div>
  </div>
  <div class="gti-header" style="margin-left:auto;">
    <span style="font-size:9px;letter-spacing:2px;color:var(--muted);">GLOBAL WAR INDEX</span>
    <span class="gti-val" id="gti-val">78</span>
    <span style="font-size:9px;color:var(--danger);letter-spacing:1px;">/ 100</span>
  </div>
  <div style="display:flex;align-items:center;gap:6px;">
    <select id="tz-select" onchange="changeTZ()"
      style="background:#080c14;border:1px solid var(--border);color:var(--muted);
             font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;
             padding:3px 6px;outline:none;cursor:pointer;">
      <option value="UTC">UTC</option>
      <option value="America/New_York">EST/EDT (紐約)</option>
      <option value="America/Los_Angeles">PST/PDT (洛杉磯)</option>
      <option value="America/Chicago">CST/CDT (芝加哥)</option>
      <option value="Europe/London">GMT/BST (倫敦)</option>
      <option value="Europe/Paris">CET/CEST (巴黎)</option>
      <option value="Europe/Kiev">EET (基輔)</option>
      <option value="Europe/Moscow">MSK (莫斯科)</option>
      <option value="Asia/Dubai">GST (杜拜)</option>
      <option value="Asia/Karachi">PKT (卡拉奇)</option>
      <option value="Asia/Kolkata">IST (印度)</option>
      <option value="Asia/Bangkok">ICT (曼谷)</option>
      <option value="Asia/Shanghai">CST (北京/上海)</option>
      <option value="Asia/Taipei">CST (台北)</option>
      <option value="Asia/Tokyo">JST (東京)</option>
      <option value="Asia/Seoul">KST (首爾)</option>
      <option value="Australia/Sydney">AEST (雪梨)</option>
      <option value="Pacific/Auckland">NZST (奧克蘭)</option>
    </select>
    <div class="utc" id="clock">--:--:-- UTC</div>
  </div>
</header>

<div id="api-banner">
  <label>API KEYS</label>
  <div class="api-group">
    <label>AIS/VESSEL</label>
    <span class="api-stat" id="ais-status">連線中…</span>
    <span id="ais-live-count" style="font-size:9px;color:var(--muted);letter-spacing:1px;">0 vessels</span>
  </div>
  <div class="api-group">
    <label>INTEL FEED</label>
    <input type="password" id="intel-key" placeholder="Intelligence API Key…" autocomplete="off" />
    <button class="btn-xs" onclick="applyKey('intel')">套用</button>
    <span class="api-stat" id="intel-status">未連線</span>
  </div>
  <div class="api-group">
    <label>SATELLITE</label>
    <span class="api-stat on">ESRI FREE</span>
  </div>
</div>

<div class="main">

  <!-- LEFT: Conflict zones -->
  <div class="sidebar">
    <div class="phead">
      ◈ 全球衝突區
      <span class="cnt" id="zone-count">0</span>
    </div>

    <div class="region-bar">
      <button class="rbtn active" onclick="filterRegion(this,'ALL')">ALL</button>
      <button class="rbtn" onclick="filterRegion(this,'EUROPE')">歐洲</button>
      <button class="rbtn" onclick="filterRegion(this,'MIDEAST')">中東</button>
      <button class="rbtn" onclick="filterRegion(this,'ASIA')">亞太</button>
      <button class="rbtn" onclick="filterRegion(this,'AFRICA')">非洲</button>
    </div>

    <div class="pbody" id="conflict-list"></div>

    <div class="stats-strip">
      <div class="stat-cell">
        <span class="sv" style="color:var(--war);" id="stat-war">0</span>
        <span class="sk">ACTIVE WAR</span>
      </div>
      <div class="stat-cell">
        <span class="sv" style="color:var(--conflict);" id="stat-conf">0</span>
        <span class="sk">CONFLICT</span>
      </div>
      <div class="stat-cell">
        <span class="sv" style="color:var(--tension);" id="stat-tens">0</span>
        <span class="sk">TENSION</span>
      </div>
    </div>

    <div id="detail-drawer">
      <div class="phead" style="font-size:9px;">◈ 戰區詳情</div>
      <div id="detail-body">
        <div style="padding:14px 10px;color:var(--muted);font-size:10px;text-align:center;">
          點擊戰區以查看詳情
        </div>
      </div>
    </div>
  </div>

  <!-- CENTER: Map -->
  <div style="position:relative;overflow:hidden;">
    <div id="map"></div>
    <div class="map-ctrl">
      <button class="mctrl active" id="btn-zones"   onclick="toggleL('zones',this)">衝突區</button>
      <button class="mctrl active" id="btn-vessels" onclick="toggleL('vessels',this)">艦艇</button>
      <button class="mctrl active" id="btn-routes"  onclick="toggleL('routes',this)">航線</button>
      <button class="mctrl active" id="btn-labels"  onclick="toggleL('labels',this)">標籤</button>
      <button class="mctrl"        id="btn-sat"     onclick="toggleSat(this)">衛星</button>
      <button class="mctrl"        onclick="map.setView([20,10],2)">全球視圖</button>
    </div>
  </div>

  <!-- RIGHT: Intel feed -->
  <div class="sidebar right">
    <div class="phead">
      ◈ 全球情報 FEED
      <span class="cnt" id="feed-count">0</span>
    </div>
    <div class="filt-bar">
      <button class="fbtn on"   onclick="setFF(this,'all')">ALL</button>
      <button class="fbtn h on" onclick="setFF(this,'high')">HIGH</button>
      <button class="fbtn m on" onclick="setFF(this,'med')">MED</button>
      <button class="fbtn on"   onclick="setFF(this,'low')">LOW</button>
    </div>
    <div class="filt-bar" style="border-bottom:1px solid var(--border);">
      <button class="fbtn on" onclick="setFR(this,'ALL')">全部地區</button>
      <button class="fbtn"    onclick="setFR(this,'EUROPE')">歐洲</button>
      <button class="fbtn"    onclick="setFR(this,'MIDEAST')">中東</button>
      <button class="fbtn"    onclick="setFR(this,'ASIA')">亞太</button>
      <button class="fbtn"    onclick="setFR(this,'AFRICA')">非洲</button>
    </div>
    <div class="pbody" id="feed-list"></div>
  </div>

</div>

<script>
// ─── Clock ────────────────────────────────────────────────────────────────────
let currentTZ = 'UTC';
function changeTZ() {
  currentTZ = document.getElementById('tz-select').value;
  tick();
}
function tick() {
  const n = new Date();
  const fmt = new Intl.DateTimeFormat('en-GB', {
    timeZone: currentTZ,
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });
  const tzLabel = currentTZ === 'UTC' ? 'UTC'
    : new Intl.DateTimeFormat('en', { timeZone: currentTZ, timeZoneName: 'short' })
        .formatToParts(n).find(p => p.type === 'timeZoneName')?.value || currentTZ;
  document.getElementById('clock').textContent = `${fmt.format(n)} ${tzLabel}`;
}
setInterval(tick, 1000); tick();

// GTI pulse
let gti = 78;
setInterval(() => {
  gti = Math.max(70, Math.min(95, gti + (Math.random()-.45)*2));
  document.getElementById('gti-val').textContent = Math.round(gti);
}, 7000);

// ─── API Keys ─────────────────────────────────────────────────────────────────
const AIS_KEY = 'dd6de9998da4846595ad14082e354b9b07dd3a3a';
const apiKeys = { intel: null, sat: null };
function applyKey(t) {
  const v = document.getElementById(t+'-key').value.trim();
  if (!v) return;
  apiKeys[t] = v;
  const el = document.getElementById(t+'-status');
  el.textContent = '已連線'; el.className = 'api-stat on';
  if (t === 'sat') buildSatLayer();
  addFeed(nowUTC(),'SYS','low','ALL',t.toUpperCase()+' API 已連線，等待資料流…');
}
function nowUTC() {
  const n = new Date(); const p = v=>String(v).padStart(2,'0');
  return `${p(n.getUTCHours())}:${p(n.getUTCMinutes())} UTC`;
}

// ─── AISstream WebSocket ──────────────────────────────────────────────────────
const liveShips = new Map();
let liveLayer; // initialized after map
let aisWs = null;
let aisReconnectTimer = null;

const AIS_BOXES = [
  // Red Sea / Gulf of Aden / Persian Gulf
  [[10, 32], [32, 65]],
  // Taiwan Strait / South China Sea / East China Sea
  [[-5, 105], [36, 135]],
  // Black Sea / Eastern Mediterranean
  [[30, 15], [48, 42]],
  // Korean Peninsula / Japan Sea
  [[33, 124], [42, 133]],
  // Indian Ocean shipping lanes
  [[-10, 55], [25, 80]],
  // North Atlantic / Europe
  [[48, -15], [62, 10]],
];

function connectAIS() {
  if (aisWs) { try { aisWs.close(); } catch(e){} }
  aisWs = new WebSocket('wss://stream.aisstream.io/v0/stream');

  aisWs.onopen = () => {
    aisWs.send(JSON.stringify({ APIKey: AIS_KEY, BoundingBoxes: AIS_BOXES }));
    const el = document.getElementById('ais-status');
    el.textContent = 'LIVE'; el.className = 'api-stat on';
    addFeed(nowUTC(),'AIS-WS','low','ALL','AISstream WebSocket 已連線，接收即時船位資料…');
  };

  aisWs.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      const meta = msg.MetaData;
      if (!meta) return;
      const pos = msg.Message?.PositionReport || msg.Message?.StandardClassBPositionReport;
      if (!pos) return;
      const mmsi = String(meta.MMSI);
      const lat = meta.latitude;
      const lng = meta.longitude;
      if (!lat || !lng || lat === 0 && lng === 0) return;

      const ship = {
        mmsi,
        name: (meta.ShipName || `MMSI ${mmsi}`).trim(),
        lat, lng,
        heading: pos.TrueHeading < 360 ? pos.TrueHeading : (pos.Cog || 0),
        speed: ((pos.Sog || 0) / 10).toFixed(1),
        navStatus: pos.NavigationalStatus ?? 15,
        updated: Date.now(),
      };
      liveShips.set(mmsi, ship);
      updateLiveMarker(ship);
      document.getElementById('ais-live-count').textContent = `${liveShips.size} vessels`;
    } catch(e) {}
  };

  aisWs.onerror = () => {
    const el = document.getElementById('ais-status');
    el.textContent = '錯誤'; el.className = 'api-stat';
  };

  aisWs.onclose = () => {
    const el = document.getElementById('ais-status');
    el.textContent = '重連中…'; el.className = 'api-stat';
    aisReconnectTimer = setTimeout(connectAIS, 5000);
  };
}

const liveMarkers = new Map();
function updateLiveMarker(ship) {
  const col = '#00aaff';
  const rot = ship.heading || 0;
  const html = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
    <g transform="rotate(${rot},12,12)">
      <polygon points="12,3 15,19 12,16 9,19" fill="${col}" opacity=".8"/>
    </g></svg>`;
  const icon = L.divIcon({ html, iconSize:[16,16], iconAnchor:[8,8], className:'' });
  const popup = `<div style="min-width:160px;font-size:10px;">
    <div style="color:#00aaff;letter-spacing:2px;margin-bottom:5px;">${ship.name}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;">
      <span style="color:var(--muted)">MMSI</span><span>${ship.mmsi}</span>
      <span style="color:var(--muted)">SPEED</span><span>${ship.speed} kn</span>
      <span style="color:var(--muted)">HDG</span><span>${Math.round(ship.heading)}°</span>
      <span style="color:var(--muted)">POS</span><span>${ship.lat.toFixed(2)}, ${ship.lng.toFixed(2)}</span>
    </div>
  </div>`;
  if (liveMarkers.has(ship.mmsi)) {
    const m = liveMarkers.get(ship.mmsi);
    m.setLatLng([ship.lat, ship.lng]);
    m.setIcon(icon);
    m.setPopupContent(popup);
  } else {
    const m = L.marker([ship.lat, ship.lng], { icon }).bindPopup(popup);
    m.addTo(liveLayer);
    liveMarkers.set(ship.mmsi, m);
  }
}

// Purge ships not updated in 10 minutes
setInterval(() => {
  const cutoff = Date.now() - 10 * 60 * 1000;
  for (const [mmsi, ship] of liveShips) {
    if (ship.updated < cutoff) {
      liveShips.delete(mmsi);
      if (liveMarkers.has(mmsi)) {
        liveLayer.removeLayer(liveMarkers.get(mmsi));
        liveMarkers.delete(mmsi);
      }
    }
  }
  document.getElementById('ais-live-count').textContent = `${liveShips.size} vessels`;
}, 60000);

// ─── Conflict Zone Markers ────────────────────────────────────────────────────
function intensityColor(level) {
  return level === 'war' ? '#ff2222' : level === 'conflict' ? '#ff7700' : level === 'tension' ? '#ffcc00' : '#44aaff';
}

function renderConflictMarkers() {
  lyrs.zones.clearLayers();
  lyrs.labels.clearLayers();
  conflicts.forEach(c => {
    const col = intensityColor(c.level);
    // Pulsing outer ring
    [1, 1.7, 2.4].forEach((mult, i) => {
      L.circle([c.lat, c.lng], {
        radius: c.radius * mult * 0.3,
        color: col, fillColor: col,
        fillOpacity: 0.03 - i*0.008,
        weight: i === 0 ? 1 : 0.3,
        dashArray: '4,6'
      }).addTo(lyrs.zones);
    });
    // Core marker
    L.circleMarker([c.lat, c.lng], {
      radius: 7 + c.intensity / 20,
      color: col, fillColor: col,
      fillOpacity: 0.85, weight: 2
    })
    .bindPopup(buildConflictPopup(c))
    .on('click', () => selectConflict(c.id))
    .addTo(lyrs.zones);
    // Label
    L.marker([c.lat + 1.5, c.lng], {
      icon: L.divIcon({
        html: `<div style="color:${col};font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;white-space:nowrap;text-shadow:0 0 4px ${col}80;">${c.flag} ${c.name}</div>`,
        className: '', iconAnchor: [0, 0]
      })
    }).addTo(lyrs.labels);
  });
}

function buildConflictPopup(c) {
  const col = intensityColor(c.level);
  return `<div style="min-width:220px;">
    <div style="color:${col};letter-spacing:2px;font-size:11px;margin-bottom:8px;">${c.flag} ${c.name}</div>
    <div style="display:grid;grid-template-columns:auto 1fr;gap:2px 8px;font-size:10px;">
      <span style="color:var(--muted)">PARTIES</span><span>${c.parties}</span>
      <span style="color:var(--muted)">SINCE</span><span>${c.since}</span>
      <span style="color:var(--muted)">CASUALTIES</span><span style="color:${col}">${c.casualties}</span>
      <span style="color:var(--muted)">FRONT</span><span>${c.frontline}</span>
      <span style="color:var(--muted)">STATUS</span><span>${c.status}</span>
      <span style="color:var(--muted)">INTENSITY</span>
      <span style="color:${col}">${c.intensity} / 100</span>
    </div>
  </div>`;
}

  const col = status === 'friendly' ? '#00e676' : status === 'hostile' ? '#ff3b3b' : '#ffaa00';
  return `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
    <g transform="rotate(${heading},12,12)">
      <polygon points="12,2 16,20 12,17 8,20" fill="${col}" opacity=".9"/>
    </g>
    <circle cx="12" cy="12" r="4" fill="none" stroke="${col}" stroke-width=".6" opacity=".5"/>
  </svg>`;
}

  ships.forEach(s => {
    const icon = L.divIcon({ html: shipSVG(s.status, s.heading), iconSize:[22,22], iconAnchor:[11,11], className:'' });
    const m = L.marker([s.lat, s.lng], { icon })
      .bindPopup(shipPopup(s))
      .on('click', () => zoomToShip(s));
    m.addTo(lyrs.vessels);
    shipMkrs[s.id] = m;
  });
}
function shipPopup(s) {
  const col = s.status==='friendly'?'var(--ok)':s.status==='hostile'?'var(--danger)':'var(--warn)';
  const posLabel = s.posType === 'LIVE-AIS'
    ? `<span style="color:var(--ok);border:1px solid var(--ok);padding:1px 4px;font-size:9px;">LIVE AIS</span>`
    : `<span style="color:var(--warn);border:1px solid var(--warn);padding:1px 4px;font-size:9px;">REPORTED</span>`;
  const srcLink = s.srcUrl
    ? `<div style="margin-top:6px;border-top:1px solid var(--border);padding-top:5px;">
        <a href="${s.srcUrl}" target="_blank" rel="noopener"
           style="color:var(--accent);font-size:10px;text-decoration:none;letter-spacing:1px;">
          ↗ 來源：${s.srcLabel || '查看報導'}
        </a>
       </div>`
    : '';
  return `<div style="min-width:200px;">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <span style="color:${col};letter-spacing:1px;font-size:10px;flex:1;">${s.name}</span>
      ${posLabel}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;font-size:10px;">
      <span style="color:var(--muted)">TYPE</span><span>${s.type}</span>
      <span style="color:var(--muted)">FLAG</span><span>${s.flag}</span>
      <span style="color:var(--muted)">SPEED</span><span>${s.speed} kn</span>
      <span style="color:var(--muted)">HDG</span><span>${s.heading}°</span>
      <span style="color:var(--muted)">POS</span><span>${s.lat.toFixed(2)}, ${s.lng.toFixed(2)}</span>
      <span style="color:var(--muted)">THREAT</span>
      <span style="color:${s.threat==='HIGH'?'var(--danger)':s.threat==='MED'?'var(--warn)':'var(--ok)'}">${s.threat}</span>
    </div>
    ${srcLink}
  </div>`;
}
function zoomToShip(s) { map.setView([s.lat, s.lng], 7, { animate:true }); }

// ─── Routes (shipping lanes under attack) ────────────────────────────────────
function renderRoutes() {
  lyrs.routes.clearLayers();
  const routes = [
    { pts:[[14.5,43.5],[12.5,44.5],[11.5,51.0]], col:'#ff3b3b', dash:'4,4' }, // Red Sea danger
    { pts:[[22.5,118.0],[24.0,121.0],[25.5,125.0]], col:'#ff3b3b', dash:'4,4' }, // Taiwan Strait

    { pts:[[9.8,115.7],[10.0,118.0],[12.0,120.0]],  col:'#ff7700', dash:'4,6' }, // SCS
    { pts:[[52.0,-3.0],[48.0,-5.0],[38.0,-10.0]],   col:'#00e676', dash:'3,6' }, // Atlantic patrol
    { pts:[[44.5,33.5],[42.0,31.0],[40.0,28.5]],    col:'#ff3b3b', dash:'4,4' }, // Black Sea

// ─── Conflict List UI ─────────────────────────────────────────────────────────
let regionFilter = 'ALL';
let selectedZone = null;

function renderConflictList() {
  const visible = conflicts.filter(c => regionFilter === 'ALL' || c.region === regionFilter);
  document.getElementById('zone-count').textContent = visible.length;
  document.getElementById('stat-war').textContent  = conflicts.filter(c=>c.level==='war').length;
  document.getElementById('stat-conf').textContent = conflicts.filter(c=>c.level==='conflict').length;
  document.getElementById('stat-tens').textContent = conflicts.filter(c=>c.level==='tension').length;

  document.getElementById('conflict-list').innerHTML = visible
    .sort((a,b) => b.intensity - a.intensity)
    .map(c => {
      const col = intensityColor(c.level);
      return `<div class="conflict-card ${c.level} ${selectedZone===c.id?'active':''}"
                   onclick="selectConflict('${c.id}')">
        <div class="c-top">
          <span class="c-flag">${c.flag}</span>
          <span class="c-name">${c.name}</span>
          <span class="c-badge ${c.level}">${c.level.toUpperCase()}</span>
        </div>
        <div class="c-meta">
          <b>${c.parties}</b><br/>
          ${c.frontline}<br/>
          傷亡：${c.casualties}
        </div>
        <div class="c-intensity">
          <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);">
            <span>INTENSITY</span><span style="color:${col}">${c.intensity}/100</span>
          </div>
          <div class="c-bar-wrap">
            <div class="c-bar" style="width:${c.intensity}%;background:${col};"></div>
          </div>
        </div>
      </div>`;
    }).join('');
}

function filterRegion(btn, r) {
  regionFilter = r;
  document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderConflictList();
}

function selectConflict(id) {
  selectedZone = id;
  const c = conflicts.find(x => x.id === id);
  if (!c) return;
  renderConflictList();
  map.setView([c.lat, c.lng], c.zoom, { animate:true });
  const col = intensityColor(c.level);
  document.getElementById('detail-body').innerHTML = `
    <div class="drow"><span class="dk">THEATRE</span><span class="dv">${c.flag} ${c.name}</span></div>
    <div class="drow"><span class="dk">LEVEL</span><span class="dv" style="color:${col}">${c.level.toUpperCase()}</span></div>
    <div class="drow"><span class="dk">PARTIES</span><span class="dv">${c.parties}</span></div>
    <div class="drow"><span class="dk">SINCE</span><span class="dv">${c.since}</span></div>
    <div class="drow"><span class="dk">CASUALTIES</span><span class="dv" style="color:${col}">${c.casualties}</span></div>
    <div class="drow"><span class="dk">FRONTLINE</span><span class="dv">${c.frontline}</span></div>
    <div class="drow"><span class="dk">STATUS</span><span class="dv">${c.status}</span></div>
    <div class="drow"><span class="dk">INTENSITY</span><span class="dv" style="color:${col}">${c.intensity} / 100</span></div>
  `;
}

// ─── Intel Feed UI ────────────────────────────────────────────────────────────
let feedPrio = new Set(['high','med','low']);
let feedRegion = 'ALL';

function setFF(btn, f) {
  if (f === 'all') {
    const allOn = ['high','med','low'].every(x => feedPrio.has(x));
    allOn ? (feedPrio.clear(), btn.parentElement.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on')))
          : (feedPrio = new Set(['high','med','low']), btn.parentElement.querySelectorAll('.fbtn').forEach(b=>b.classList.add('on')));
  } else {
    feedPrio.has(f) ? (feedPrio.delete(f), btn.classList.remove('on'))
                    : (feedPrio.add(f), btn.classList.add('on'));
  }
  renderFeed();
}

function setFR(btn, r) {
  feedRegion = r;
  btn.closest('.filt-bar').querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderFeed();
}

function renderFeed() {
  const vis = feedData.filter(f =>
    feedPrio.has(f.priority) &&
    (feedRegion === 'ALL' || f.region === feedRegion)
  );
  document.getElementById('feed-count').textContent = vis.length;
  document.getElementById('feed-list').innerHTML = vis.map(f => {
    const rcol = f.priority==='high'?'var(--danger)':f.priority==='med'?'var(--warn)':'#7a9e7a';
    const rmap = { EUROPE:'歐洲',MIDEAST:'中東',ASIA:'亞太',AFRICA:'非洲' };
    const hasLink = !!f.url;
    const clickHandler = hasLink
      ? `onclick="window.open('${f.url.replace(/'/g,"\\'")}','_blank')"`
      : `onclick="jumpFeed('${f.region}')"`;
    const linkBadge = hasLink
      ? `<span style="margin-left:auto;font-size:9px;color:var(--accent);letter-spacing:1px;border:1px solid var(--accent);padding:1px 4px;">↗ 來源</span>`
      : `<span style="margin-left:auto;font-size:9px;color:var(--muted);letter-spacing:1px;">[SIM]</span>`;
    return `<div class="feed-item" ${clickHandler} style="${hasLink?'cursor:pointer;':''}">
      <div class="feed-head">
        <span class="feed-time">${f.time}</span>
        <span class="feed-region" style="border-color:${rcol};color:${rcol};">${rmap[f.region]||f.region}</span>
        <span class="feed-src" style="color:var(--muted);">${f.src}</span>
        ${linkBadge}
      </div>
      <div class="feed-txt ${f.priority}">${f.txt}</div>
    </div>`;
  }).join('');
}

function jumpFeed(region) {
  const centers = {
    EUROPE:[50,20,4], MIDEAST:[25,45,4], ASIA:[20,110,4], AFRICA:[5,25,3]
  };
  if (centers[region]) map.setView([centers[region][0], centers[region][1]], centers[region][2], { animate:true });
}

function addFeed(time, src, priority, region, txt, url) {
  feedData.unshift({ time, src, priority, region, txt, url: url || null });
  if (feedData.length > 120) feedData.splice(120);
  renderFeed();
}

// Military vessel positions are static (last reported). No fake movement.

// ─── GDELT Project live news ──────────────────────────────────────────────────
const GDELT_QUERIES = [
  { q:'Ukraine Russia war',      region:'EUROPE'  },
  { q:'Gaza Israel Hamas war',   region:'MIDEAST' },
  { q:'Red Sea Houthi attack',   region:'MIDEAST' },
  { q:'Taiwan Strait China military', region:'ASIA' },
  { q:'Sudan conflict RSF',      region:'AFRICA'  },
  { q:'Myanmar civil war',       region:'ASIA'    },
];
let gdeltQIdx = 0;

async function fetchGDELT() {
  const { q, region } = GDELT_QUERIES[gdeltQIdx % GDELT_QUERIES.length];
  gdeltQIdx++;
  const url = `https://api.gdeltproject.org/api/v2/doc/doc?query=${encodeURIComponent(q)}&mode=artlist&maxrecords=5&sort=datedesc&format=json`;
  try {
    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();
    (data.articles || []).slice(0, 3).forEach(a => {
      const title = a.title?.slice(0, 90) || '無標題';
      const domain = (a.domain || 'GDELT').replace(/^www\./,'');
      addFeed(nowUTC(), domain, 'med', region, title, a.url || null);
    });
  } catch(e) {}
}
fetchGDELT();
setInterval(fetchGDELT, 60000);
